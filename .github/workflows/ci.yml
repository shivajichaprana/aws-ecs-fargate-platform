name: ecs-platform-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.9.8"

jobs:
  fmt:
    name: terraform-fmt
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Check canonical formatting
        run: terraform fmt -check -diff -recursive

  validate:
    name: terraform-validate
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dir:
          - .
          - modules/ecs-cluster
          - modules/service
          - modules/service-connect
          - modules/blue-green
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Init
        run: terraform -chdir="${{ matrix.dir }}" init -backend=false -input=false

      - name: Validate
        run: terraform -chdir="${{ matrix.dir }}" validate

  test:
    name: terraform-test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        dir:
          - modules/ecs-cluster
          - modules/service
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Init
        run: terraform -chdir="${{ matrix.dir }}" init -backend=false -input=false

      - name: Run module test suite
        run: terraform -chdir="${{ matrix.dir }}" test

  tflint:
    name: tflint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.0.0
        with:
          tflint_version: v0.53.0

      - name: Lint all configurations
        run: tflint --recursive --minimum-failure-severity=error --format=compact

  checkov:
    name: checkov
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      # Accepted findings, excluded with reasons:
      #   CKV_AWS_338  log retention is caller-configurable (log_retention_in_days);
      #                the platform default favours cost over a fixed 1-year floor.
      #   CKV2_AWS_64  the module-managed ECS Exec key deliberately keeps the AWS
      #                default key policy; callers needing a custom policy supply
      #                their own key through kms_key_arn.
      #   CKV_AWS_378  load-balancer-to-task traffic is plain HTTP inside the VPC
      #                by design; TLS terminates at the listener, which supports
      #                TLS 1.3 policies.
      - name: Scan Terraform configurations
        run: >-
          checkov --directory . --framework terraform --skip-download
          --quiet --compact
          --skip-check CKV_AWS_338,CKV2_AWS_64,CKV_AWS_378

  ci-complete:
    name: ci-complete
    runs-on: ubuntu-24.04
    needs: [fmt, validate, test, tflint, checkov]
    steps:
      - name: All checks passed
        run: echo "All CI jobs completed successfully."
